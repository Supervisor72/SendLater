<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Programmatore Telegram</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f5f5f7; padding: 20px; display: flex; justify-content: center; }
        .card { background: #ffffff; padding: 24px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05); width: 100%; max-width: 400px; }
        h2 { color: #007aff; text-align: center; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .hidden { display: none !important; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #555; }
        textarea, input, select { width: 100%; padding: 12px; border: 1px solid #e5e5ea; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 16px; background-color: #007aff; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:disabled { background-color: #999; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 Programma Messaggio</h2>
    <form id="msgForm">
        <div class="form-group">
            <label for="messaggio">Messaggio di Testo</label>
            <textarea id="messaggio" required placeholder="Scrivi qui..."></textarea>
        </div>
        <div class="form-group">
            <label for="allegato">Link Allegato (URL)</label>
            <input type="url" id="allegato" placeholder="https://...">
        </div>
        <div class="form-group">
            <label for="dataOra">Data e Ora di Inizio</label>
            <input type="datetime-local" id="dataOra" required>
        </div>
        <div class="form-group">
            <label for="frequenza">Frequenza</label>
            <select id="frequenza">
                <option value="Singolo">Singolo Invio</option>
                <option value="Settimanale">Settimanale</option>
                <option value="Mensile">Mensile</option>
            </select>
        </div>
        <div class="form-group hidden" id="intervalloGroup">
            <label id="labelIntervallo" for="intervallo">Ogni quanto?</label>
            <input type="number" id="intervallo" value="1" min="1">
        </div>
        <button type="submit" id="submitBtn">Programma Messaggio</button>
    </form>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwDfuUL68DeSagNMutnpJnrwZvttcQiG-6CipbrG_H-qy5cAh1pCr5JyKYnr_hd526I/exec";

    const freq = document.getElementById('frequenza');
    const group = document.getElementById('intervalloGroup');

    freq.addEventListener('change', () => {
        if(freq.value !== 'Singolo') {
            group.classList.remove('hidden');
            document.getElementById('labelIntervallo').innerText = freq.value === 'Settimanale' ? "Ogni quante settimane?" : "Ogni quanti mesi?";
        } else {
            group.classList.add('hidden');
        }
    });

    document.getElementById('msgForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Salvataggio...";

        const payload = {
            messaggio: document.getElementById('messaggio').value,
            allegato: document.getElementById('allegato').value,
            dataOra: document.getElementById('dataOra').value.replace('T', ' '),
            frequenza: freq.value,
            intervallo: document.getElementById('intervallo').value
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert('Messaggio programmato con successo!');
            document.getElementById('msgForm').reset();
            group.classList.add('hidden');
        })
        .catch(err => alert('Errore: ' + err))
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "Programma Messaggio";
        });
    });
</script>

</body>
</html>
